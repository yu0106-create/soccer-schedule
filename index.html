<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>축구교실 주간 시간표</title>
</head>
<body>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhixzMFjuydP-EQbqQsdkM3OWA0e504AM",
    authDomain: "soccer-schedule-8f27b.firebaseapp.com",
    projectId: "soccer-schedule-8f27b",
    storageBucket: "soccer-schedule-8f27b.firebasestorage.app",
    messagingSenderId: "124179804938",
    appId: "1:124179804938:web:64439993e82608e07e00f3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const stateRef = doc(db, "soccer", "state");

  window._fbSave = function(state){
    return setDoc(stateRef, state);
  };
  window._fbSubscribe = function(callback){
    return onSnapshot(stateRef, function(snap){
      callback(snap.exists() ? snap.data() : null);
    }, function(err){
      console.error('firestore sync error', err);
      window.dispatchEvent(new CustomEvent('fb-error'));
    });
  };

  window.dispatchEvent(new CustomEvent('fb-ready'));
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap">
<style>
  :root{
    --ink:#14171c;
    --sub:#6b7280;
    --line:#d7deea;
    --bg:#ffffff;
    --panel:#eef1f9;
    --accent:#1e3a8a;
    --accent-dark:#132a66;
    --accent-soft:#e2e7f7;
    --danger:#c0392b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body,.app{
    font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-weight:400;
    color:var(--ink);
    background:var(--bg);
  }
  .app{max-width:900px;margin:0 auto;padding:20px 16px 60px;}

  .title-row{display:flex;align-items:baseline;justify-content:center;gap:10px;flex-wrap:wrap;position:relative;}
  h1{
    font-size:24px;
    font-weight:700;
    margin:4px 0 2px;
    letter-spacing:-0.02em;
    text-align:center;
    width:100%;
  }
  .sync-status{
    font-size:13px;
    color:var(--sub);
    padding:4px 10px;
    border:1px solid var(--line);
    white-space:nowrap;
    position:absolute;
    right:0;
    top:4px;
  }
  .sync-status.ok{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-soft);}
  .sync-status.err{color:var(--danger);}

  .top-save-row{
    display:flex;
    justify-content:center;
    margin:6px 0 16px;
  }
  .top-save-row button{
    width:100%;
    max-width:320px;
  }

  .lead{
    font-size:14px;
    color:var(--sub);
    margin:0 0 20px;
    line-height:1.5;
  }

  .week-planner{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(84px, 1fr));
    gap:8px;
    margin:14px 0 22px;
  }
  .planner-day{
    border:1px solid var(--line);
    padding:8px 6px;
    min-height:56px;
  }
  .planner-day-head{
    font-weight:700;
    font-size:13px;
    color:var(--accent);
    text-align:center;
    margin:0 0 6px;
    padding-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .planner-entry{
    font-size:12px;
    line-height:1.35;
    margin-bottom:6px;
    text-align:center;
  }
  .planner-time{display:block;font-weight:600;color:var(--ink);}
  .planner-name{display:block;color:var(--sub);}
  .planner-empty{
    font-size:12px;
    color:var(--sub);
    text-align:center;
    padding-top:6px;
  }

  .default-fee-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin:0 0 16px;
  }
  .default-fee-label{
    font-size:13px;
    font-weight:600;
    color:var(--sub);
  }
  .default-fee-row input{
    width:70px;
    border:1px solid var(--line);
    padding:8px 10px;
    font-size:16px;
    font-family:inherit;
  }
  .default-fee-row input:focus{outline:none;background:var(--accent-soft);}
  .default-fee-unit{font-size:13px;color:var(--sub);}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:0;
    padding:16px;
    margin-bottom:16px;
  }
  .panel-title{
    font-size:14px;
    font-weight:600;
    color:var(--sub);
    margin:0 0 10px;
  }

  .btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  button{
    -webkit-appearance:none;
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-size:17px;
    font-weight:600;
    border-radius:0;
    padding:12px 18px;
    min-height:46px;
    touch-action:manipulation;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-secondary{background:#fff;color:var(--ink);border:1px solid var(--line);}
  .btn-secondary:active{background:var(--accent-soft);}
  .btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--line);}

  .sheet-head{
    margin:28px 0 4px;
  }
  .week-title{
    font-size:22px;
    font-weight:700;
    border:none;
    border-bottom:2px solid var(--accent);
    padding:4px 2px 6px;
    background:transparent;
  }
  .week-title:focus{outline:none;}
  .sheet-head .week-title{display:block;width:100%;}
  .week-sub-line{
    display:flex;
    align-items:center;
    gap:10px;
    white-space:nowrap;
    overflow:hidden;
    margin:6px 0 10px;
  }
  .week-range{font-size:14px;font-weight:600;color:var(--accent);}
  .week-meta{font-size:13px;color:var(--sub);}

  .editing-badge{font-size:14px;color:var(--accent);margin:0 0 12px;}
  .editing-badge:empty{display:none;margin:0;}

  .sheet{
    border:1px solid var(--line);
    border-radius:0;
    overflow:hidden;
    background:#fff;
  }

  .table-scroll{overflow-x:hidden;}

  table{width:100%;table-layout:fixed;border-collapse:collapse;}
  thead th{
    background:var(--accent);
    color:#fff;
    font-size:15px;
    font-weight:600;
    text-align:left;
    padding:10px 8px;
    white-space:normal;
    word-break:keep-all;
  }
  tbody td{
    padding:var(--cell-py, 20px) 8px;
    font-size:var(--cell-font, 18px);
    border-top:1px solid var(--line);
    line-height:1.4;
    min-width:0;
    overflow-wrap:break-word;
    word-break:break-word;
  }
  tbody td[contenteditable="true"]{outline:none;}
  tbody td[contenteditable="true"]:focus{background:var(--accent-soft);}
  tbody tr:nth-child(even){background:#f6f8fc;}
  .col-name{width:12%;cursor:pointer;}
  .col-day{width:8%;cursor:pointer;}
  .col-time{width:11%;}
  .col-place{width:14%;cursor:pointer;}
  .col-session{width:9%;cursor:pointer;}
  .col-fee{width:13%;}
  .col-paid{width:16%;overflow:hidden;}
  .paid-date-input{
    width:100%;
    max-width:100%;
    box-sizing:border-box;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:clamp(11px, var(--cell-font, 18px), 17px);
    color:inherit;
    padding:0;
  }
  .paid-date-input:focus{outline:none;background:var(--accent-soft);}
  .picker-text{display:block;min-height:20px;}
  .col-del{width:44px;text-align:center;}

  .attend-toggle{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:28px;
    height:28px;
    min-height:0;
    padding:0;
    margin-right:6px;
    font-size:15px;
    font-weight:700;
    background:#fff;
    border:1px solid var(--line);
    color:var(--sub);
    vertical-align:middle;
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
    touch-action:none;
    outline:none;
  }
  .attend-toggle:focus{outline:none;}
  .col-fee[data-attended="true"]{background:var(--accent-soft);}
  .col-fee[data-attended="true"] .attend-toggle{background:var(--accent);color:#fff;border-color:var(--accent);}
  .col-fee[data-attended="false"] .attend-toggle{background:#fff;color:var(--danger);border-color:var(--danger);}
  .col-fee[data-attended="false"] .fee-amount{color:var(--danger);text-decoration:line-through;}
  .fee-amount{display:inline-block;min-width:16px;outline:none;}
  .fee-unit{font-size:14px;color:var(--sub);margin-left:3px;}

  .del-btn{
    background:transparent;
    border:none;
    color:var(--sub);
    font-size:18px;
    padding:6px;
    min-height:32px;
    border-radius:0;
  }
  .del-btn:active{background:#f1e2e0;color:var(--danger);}

  .add-row-btn{
    display:block;
    width:100%;
    background:#fff;
    border:none;
    border-top:1px dashed var(--line);
    color:var(--accent);
    font-size:16px;
    font-weight:600;
    padding:12px;
    text-align:center;
  }
  .add-row-btn:active{background:var(--accent-soft);}

  .fee-summary{
    border-top:2px solid var(--accent);
    padding:12px 16px;
    background:#fafbfd;
  }
  .fee-summary-row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:16px;
    font-weight:600;
    padding:4px 0;
  }
  .fee-summary-row.deduct{color:var(--accent);}

  .export-row{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap:wrap;
  }

  /* Picker popover (shared by name / day / place / note) */
  .picker-popover{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:1000;
    background:#fff;
    border:1px solid var(--line);
    border-radius:0;
    box-shadow:0 8px 24px rgba(16,24,40,0.16);
    width:min(92vw, 380px);
    max-height:min(70vh, 480px);
    display:none;
    flex-direction:column;
  }
  .picker-popover.open{display:flex;}
  .picker-list{flex:1;min-height:0;max-height:min(50vh, 340px);overflow-y:auto;}
  .picker-option{
    display:block;
    width:100%;
    text-align:left;
    background:#fff;
    border:none;
    border-bottom:1px solid var(--line);
    padding:11px 14px;
    font-size:16px;
    color:var(--ink);
  }
  .picker-option:active{background:var(--accent-soft);}
  .picker-option .del-option{
    float:right;
    color:var(--sub);
    font-size:14px;
  }
  .picker-add{
    display:flex;
    border-top:1px solid var(--line);
  }
  .picker-add input{
    flex:1;
    min-width:0;
    border:none;
    padding:11px 12px;
    font-size:16px;
    font-family:inherit;
  }
  .picker-add input:focus{outline:none;background:var(--accent-soft);}
  .picker-add button{
    background:var(--accent);
    color:#fff;
    padding:0 16px;
    font-size:14px;
    min-height:0;
    flex:0 0 auto;
    white-space:nowrap;
  }
  .popover-backdrop{
    position:fixed;inset:0;z-index:999;display:none;
  }
  .popover-backdrop.open{display:block;}

  /* Weekly archive */
  .archive-panel{margin-top:24px;}
  .archive-cumulative{
    font-size:16px;
    font-weight:700;
    color:var(--accent);
    padding:2px 2px 14px;
    border-bottom:1px solid var(--line);
    margin-bottom:10px;
  }
  .archive-empty{
    font-size:15px;
    color:var(--sub);
    padding:8px 2px;
  }
  .archive-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:#fff;
    border:1px solid var(--line);
    padding:12px 14px;
    margin-bottom:8px;
  }
  .archive-info{min-width:0;}
  .archive-title{font-size:16px;font-weight:600;}
  .archive-date{font-size:13.5px;color:var(--sub);margin-top:2px;}
  .archive-actions{display:flex;gap:8px;flex-shrink:0;}
  .archive-actions button{
    padding:8px 12px;
    font-size:15px;
    min-height:36px;
  }

  .row-height-panel{margin-bottom:16px;}
  .row-height-control{display:flex;align-items:center;gap:12px;}
  .row-height-control input[type="range"]{
    flex:1;
    height:36px;
    accent-color:var(--accent);
  }
  .row-height-value{
    font-size:14px;
    font-weight:600;
    color:var(--accent);
    min-width:44px;
    text-align:right;
  }

  /* Edit modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(20,23,28,0.55);
    z-index:900;
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:24px 12px;
    overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:#fff;
    width:100%;
    max-width:780px;
    margin-top:16px;
    margin-bottom:16px;
    padding:18px;
    border:1px solid var(--line);
  }
  .modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .modal-title-input{flex:1;min-width:0;}
  .modal-close{
    background:transparent;
    border:none;
    font-size:26px;
    line-height:1;
    padding:4px 8px;
    min-height:0;
    color:var(--sub);
  }
  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .modal-actions button{flex:1;}

  /* Mobile tweaks */
  @media (max-width: 480px){
    .app{padding:14px 10px 40px;}
    h1{font-size:19px;}
    .sync-status{position:static;display:inline-block;margin-top:6px;}
    .title-row{flex-direction:column;align-items:center;}
    .export-row{flex-direction:column;}
    .export-row button{width:100%;}
    .archive-item{flex-direction:column;align-items:flex-start;}
    .archive-actions{width:100%;}
    .archive-actions button{flex:1;}
    .modal-box{padding:12px;margin-top:8px;}
  }

  /* Print / PDF capture styling */
  @media print{
    .no-print{display:none !important;}
    body{background:#fff;}
    .app{max-width:none;padding:0;margin:0;}
    .sheet{border:none;border-radius:0;}
    @page{size:A4;margin:14mm;}
  }
</style>

<div class="app">
  <div class="title-row">
    <h1>축구교실 주간 시간표</h1>
    <span class="sync-status no-print" id="syncStatus">연결 중...</span>
  </div>

  <div class="top-save-row no-print">
    <button class="btn-primary" id="topSaveBtn">저장</button>
  </div>

  <div class="week-planner no-print" id="weekPlanner"></div>

  <div class="default-fee-row no-print">
    <span class="default-fee-label">새 학생 기본 수업료</span>
    <input type="number" id="defaultFeeInput" min="0" step="1" value="50">
    <span class="default-fee-unit">불</span>
  </div>

  <div class="sheet-head">
    <input class="week-title" id="weekTitle" value="이번 주 축구교실 시간표">
  </div>
  <div class="week-sub-line">
    <span class="week-range" id="weekRange"></span>
    <span class="week-meta" id="weekMeta"></span>
  </div>
  <span class="editing-badge no-print" id="editingBadge"></span>

  <div class="sheet" id="sheet">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="col-name">이름</th>
            <th class="col-day">요일</th>
            <th class="col-time">시간</th>
            <th class="col-place">장소</th>
            <th class="col-session">회차</th>
            <th class="col-paid">납부일</th>
            <th class="col-fee">수업료</th>
            <th class="col-del no-print"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <button class="add-row-btn no-print" id="addRowBtn">+ 행 추가</button>
    <div class="fee-summary" id="feeSummary">
      <div class="fee-summary-row"><span>예상 수업료</span><span id="feeExpected">0불</span></div>
      <div class="fee-summary-row deduct" id="feeActualRow"><span>확정된 수업료</span><span id="feeActual">0불</span></div>
    </div>
  </div>

  <div class="export-row no-print">
    <button class="btn-primary" id="pdfBtn">PDF로 저장</button>
    <button class="btn-secondary" id="saveWeekBtn">이번 주 저장</button>
    <button class="btn-secondary" id="lastWeekBtn">지난주 시간표 그대로 불러오기</button>
    <button class="btn-ghost" id="newWeekBtn">새 주로 시작</button>
  </div>

  <div class="panel archive-panel no-print">
    <p class="panel-title">저장된 주간 기록</p>
    <div class="archive-cumulative" id="archiveCumulative"></div>
    <div id="archiveList"></div>
  </div>
</div>

<div class="modal-overlay no-print" id="editModalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <input class="week-title modal-title-input" id="modalWeekTitle" value="">
      <button type="button" class="modal-close" id="modalCloseBtn">&times;</button>
    </div>
    <div class="sheet">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th class="col-name">이름</th>
              <th class="col-day">요일</th>
              <th class="col-time">시간</th>
              <th class="col-place">장소</th>
              <th class="col-session">회차</th>
              <th class="col-paid">납부일</th>
              <th class="col-fee">수업료</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody id="modalTableBody"></tbody>
        </table>
      </div>
      <button class="add-row-btn" id="modalAddRowBtn">+ 행 추가</button>
      <div class="fee-summary">
        <div class="fee-summary-row"><span>예상 수업료</span><span id="modalFeeExpected">0불</span></div>
        <div class="fee-summary-row deduct" id="modalFeeActualRow"><span>확정된 수업료</span><span id="modalFeeActual">0불</span></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="modalSaveBtn">저장</button>
      <button class="btn-secondary" id="modalCancelBtn">취소</button>
    </div>
  </div>
</div>

<div class="modal-overlay no-print" id="pdfModalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="week-title" style="font-size:19px;">PDF 만들기 전 크기 조절</span>
      <button type="button" class="modal-close" id="pdfModalCloseBtn">&times;</button>
    </div>
    <div class="panel row-height-panel" style="margin-bottom:16px;">
      <p class="panel-title">칸 높이 조절</p>
      <div class="row-height-control">
        <input type="range" id="pdfRowHeightSlider" min="10" max="48" step="2" value="20">
        <span class="row-height-value" id="pdfRowHeightValue">20px</span>
      </div>
      <p class="panel-title" style="margin-top:14px;">글자 크기 조절</p>
      <div class="row-height-control">
        <input type="range" id="pdfFontSizeSlider" min="12" max="32" step="1" value="18">
        <span class="row-height-value" id="pdfFontSizeValue">18px</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="pdfConfirmBtn">PDF 만들기</button>
      <button class="btn-secondary" id="pdfModalCancelBtn">취소</button>
    </div>
  </div>
</div>

<div class="popover-backdrop no-print" id="popoverBackdrop"></div>
<div class="picker-popover no-print" id="pickerPopover">
  <div class="picker-list" id="pickerList"></div>
  <div class="picker-add">
    <input type="text" id="newOptionInput" placeholder="새 항목 입력">
    <button id="newOptionBtn" type="button">추가</button>
  </div>
</div>

<script>
(function(){
  const tableBody = document.getElementById('tableBody');
  const addRowBtn = document.getElementById('addRowBtn');
  const weekTitle = document.getElementById('weekTitle');
  const weekMeta = document.getElementById('weekMeta');
  const weekRangeEl = document.getElementById('weekRange');
  const editingBadgeEl = document.getElementById('editingBadge');
  const pdfBtn = document.getElementById('pdfBtn');
  const saveWeekBtn = document.getElementById('saveWeekBtn');
  const lastWeekBtn = document.getElementById('lastWeekBtn');
  const newWeekBtn = document.getElementById('newWeekBtn');
  const sheet = document.getElementById('sheet');
  const archiveList = document.getElementById('archiveList');
  const archiveCumulativeEl = document.getElementById('archiveCumulative');

  const CACHE_KEY = 'soccer_state_cache_v1';

  const DEFAULTS = {
    name:  ['오스카','엘리엇','임레온','브라이언','도라','엠레','래미','이안','샤르베시','앤쓴'],
    day:   ['월','화','수','목','금','토','일'],
    place: ['홈랜드','메도뱅크','에핑','에릭 파크'],
    session: ['1','2','3','4','5']
  };

  function loadCache(){
    try{
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e){}
    return null;
  }
  function saveCache(state){
    try{ localStorage.setItem(CACHE_KEY, JSON.stringify(state)); } catch(e){}
  }

  const cached = loadCache();
  let fieldData = cached && cached.locations ? cached.locations : {
    name: DEFAULTS.name.slice(), day: DEFAULTS.day.slice(),
    place: DEFAULTS.place.slice(), session: DEFAULTS.session.slice()
  };
  ['name','day','place','session'].forEach(function(f){ if(!fieldData[f]) fieldData[f] = []; });
  let weeksArchive = cached && cached.weeks ? cached.weeks : [];
  let defaultFee = cached && cached.defaultFee ? cached.defaultFee : '50';
  defaultFeeInput.value = defaultFee;
  defaultFeeInput.addEventListener('change', function(){
    const val = String(parseInt(defaultFeeInput.value, 10) || 0);
    defaultFeeInput.value = val;
    defaultFee = val;
    pushState();
  });
  let localUpdatedAt = cached && cached.updatedAt ? cached.updatedAt : 0;
  let currentWeekId = null;

  function setSyncStatus(text, cls){
    syncStatusEl.textContent = text;
    syncStatusEl.className = 'sync-status no-print' + (cls ? ' ' + cls : '');
  }

  // Firestore does not allow arrays nested inside arrays. Internally each row
  // is a plain array (name/day/time/place/note/fee/paid/attended), and
  // week.rows is an array of those rows — an array of arrays — which
  // Firestore rejects outright. We only need to reshape rows into objects
  // when talking to Firestore; localStorage and the rest of the app keep
  // using the simpler array form untouched.
  function rowToFsObj(r){
    r = r || [];
    return { name:r[0]||'', day:r[1]||'', time:r[2]||'', place:r[3]||'', session:r[4]||'', fee:r[5]||'', paid:r[6]||'', attended: (r[7] !== 'false' && r[7] !== false) };
  }
  function rowFromFsObj(r){
    if (Array.isArray(r)) return r; // already in array form (e.g. old cached shape)
    r = r || {};
    return [r.name||'', r.day||'', r.time||'', r.place||'', r.session||'', r.fee||'', r.paid||'', r.attended === false ? 'false' : 'true'];
  }
  function weeksToFirestore(weeks){
    return weeks.map(function(w){
      return Object.assign({}, w, { rows: (w.rows || []).map(rowToFsObj) });
    });
  }
  function weeksFromFirestore(weeks){
    return (weeks || []).map(function(w){
      return Object.assign({}, w, { rows: (w.rows || []).map(rowFromFsObj) });
    });
  }

  function pushState(){
    localUpdatedAt = Date.now();
    const cachePayload = { locations: fieldData, weeks: weeksArchive, defaultFee: defaultFee, updatedAt: localUpdatedAt };
    saveCache(cachePayload);
    if (window._fbSave){
      setSyncStatus('저장 중...', '');
      const fsPayload = { locations: fieldData, weeks: weeksToFirestore(weeksArchive), defaultFee: defaultFee, updatedAt: localUpdatedAt };
      Promise.resolve().then(function(){ return window._fbSave(fsPayload); })
        .then(function(){ setSyncStatus('동기화됨', 'ok'); })
        .catch(function(err){
          console.error('sync save failed', err);
          setSyncStatus('오프라인 (기기에만 저장됨)', 'err');
        });
    }
  }

  window.addEventListener('fb-ready', function(){
    setSyncStatus('연결 중...', '');
    window._fbSubscribe(function(remote){
      if (remote){
        const remoteUpdatedAt = remote.updatedAt || 0;
        if (remoteUpdatedAt < localUpdatedAt){
          // Our cached local save is newer than what's on the server (e.g. the
          // previous write hadn't finished before a refresh). Don't let the
          // stale remote copy erase it — push our local copy again instead.
          pushState();
          return;
        }
        fieldData = remote.locations || fieldData;
        ['name','day','place','session'].forEach(function(f){ if(!fieldData[f]) fieldData[f] = []; });
        weeksArchive = weeksFromFirestore(remote.weeks || []);
        if (remote.defaultFee){
          defaultFee = remote.defaultFee;
          defaultFeeInput.value = defaultFee;
        }
        localUpdatedAt = remoteUpdatedAt;
        saveCache({ locations: fieldData, weeks: weeksArchive, defaultFee: defaultFee, updatedAt: localUpdatedAt });
        renderArchive();
        setSyncStatus('동기화됨', 'ok');
      } else {
        pushState();
      }
    });
  });
  window.addEventListener('fb-error', function(){
    setSyncStatus('오프라인 (기기에만 저장됨)', 'err');
  });

  // ---- Auto-fit for the live view: pick the largest font size (and a
  // matching row padding) that fits the current browser width without any
  // cell content wrapping to a second line. Re-run whenever the viewport
  // size changes or the table's row count/content changes meaningfully.
  let autoFontSize = 18;
  let autoRowPadding = 14;
  const AUTOFIT_SIZES = [22, 20, 18, 17, 16, 15, 14, 13, 12, 11];

  function applyLiveSizing(fontPx, padPx){
    document.documentElement.style.setProperty('--cell-font', fontPx + 'px');
    document.documentElement.style.setProperty('--cell-py', padPx + 'px');
  }

  function autoFitTable(){
    if (!tableBody.children.length){ return; }
    let chosen = AUTOFIT_SIZES[AUTOFIT_SIZES.length - 1];
    for (let i = 0; i < AUTOFIT_SIZES.length; i++){
      const size = AUTOFIT_SIZES[i];
      const pad = Math.max(8, Math.round(size * 0.55));
      applyLiveSizing(size, pad);
      void sheet.offsetHeight;
      let wrapped = false;
      const cells = tableBody.querySelectorAll('td');
      for (let j = 0; j < cells.length; j++){
        const td = cells[j];
        const lineHeightPx = size * 1.4;
        const cs = getComputedStyle(td);
        const py = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
        if (td.scrollHeight > lineHeightPx + py + 4){ wrapped = true; break; }
      }
      if (!wrapped){ chosen = size; break; }
    }
    autoFontSize = chosen;
    autoRowPadding = Math.max(8, Math.round(chosen * 0.55));
    applyLiveSizing(autoFontSize, autoRowPadding);
  }

  let autoFitTimer = null;
  function scheduleAutoFit(){
    clearTimeout(autoFitTimer);
    autoFitTimer = setTimeout(autoFitTable, 60);
  }
  window.addEventListener('resize', function(){
    clearTimeout(autoFitTimer);
    autoFitTimer = setTimeout(autoFitTable, 200);
  });

  // ---- PDF settings popup ----
  function applyPdfSliderLabel(){
    pdfRowHeightValue.textContent = pdfRowHeightSlider.value + 'px';
    pdfFontSizeValue.textContent = pdfFontSizeSlider.value + 'px';
  }
  function openPdfModal(){
    pdfRowHeightSlider.value = autoRowPadding;
    pdfFontSizeSlider.value = autoFontSize;
    applyPdfSliderLabel();
    applyLiveSizing(parseInt(pdfFontSizeSlider.value, 10), parseInt(pdfRowHeightSlider.value, 10));
    pdfModalOverlay.classList.add('open');
  }
  function closePdfModal(revert){
    if (revert) applyLiveSizing(autoFontSize, autoRowPadding);
    pdfModalOverlay.classList.remove('open');
  }
  pdfRowHeightSlider.addEventListener('input', function(){
    applyPdfSliderLabel();
    applyLiveSizing(parseInt(pdfFontSizeSlider.value, 10), parseInt(pdfRowHeightSlider.value, 10));
  });
  pdfFontSizeSlider.addEventListener('input', function(){
    applyPdfSliderLabel();
    applyLiveSizing(parseInt(pdfFontSizeSlider.value, 10), parseInt(pdfRowHeightSlider.value, 10));
  });
  pdfModalCloseBtn.addEventListener('click', function(){ closePdfModal(true); });
  pdfModalCancelBtn.addEventListener('click', function(){ closePdfModal(true); });

  function todayLabel(){
    const d = new Date();
    return `작성일 ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  weekMeta.textContent = todayLabel();

  function getWeekRangeLabel(){
    const d = new Date();
    const day = d.getDay(); // 0=Sun ... 6=Sat
    const diffToMonday = (day === 0 ? -6 : 1 - day);
    const monday = new Date(d);
    monday.setDate(d.getDate() + diffToMonday);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    function fmt(dt){ return `${dt.getMonth() + 1}.${dt.getDate()}`; }
    return `${fmt(monday)} ~ ${fmt(sunday)}`;
  }
  weekRangeEl.textContent = getWeekRangeLabel();

  function autoWeekTitle(){
    const d = new Date();
    const month = d.getMonth() + 1;
    const weekOfMonth = Math.ceil(d.getDate() / 7);
    return `${month}월 ${weekOfMonth}째주 시간표`;
  }
  weekTitle.value = autoWeekTitle();

  let activePickerCell = null;
  let activeField = null;

  function makePickerCell(text, colClass, field){
    const td = document.createElement('td');
    td.className = colClass;
    const span = document.createElement('span');
    span.className = 'picker-text';
    span.textContent = text || '';
    td.appendChild(span);
    td.addEventListener('click', function(){
      openPickerPopover(td, field);
    });
    return td;
  }

  function makeEditableCell(text, cls, onChange){
    const td = document.createElement('td');
    td.className = cls || '';
    td.contentEditable = 'true';
    td.textContent = text || '';
    if (onChange) td.addEventListener('input', onChange);
    return td;
  }

  function parseFee(text){
    const n = parseInt(String(text || '').replace(/[^0-9-]/g, ''), 10);
    return isNaN(n) ? 0 : n;
  }
  function formatWon(n){
    return n.toLocaleString('ko-KR') + '불';
  }

  function normalizeAttended(v){
    return v === 'true' ? 'true' : (v === 'false' ? 'false' : '');
  }

  function makeFeeCell(fee, attendedState, onChange){
    const td = document.createElement('td');
    td.className = 'col-fee';
    td.setAttribute('data-attended', attendedState || '');

    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'attend-toggle no-print-inert';
    toggle.title = '탭: 참석 체크 · 길게 누르면: 불참 표시';

    function renderGlyph(state){
      if (state === 'true'){
        toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><polyline points="4 12 9 17 20 6"></polyline></svg>';
      } else if (state === 'false'){
        toggle.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><line x1="5" y1="5" x2="19" y2="19"></line><line x1="19" y1="5" x2="5" y2="19"></line></svg>';
      } else {
        toggle.innerHTML = '';
      }
    }
    renderGlyph(attendedState || '');

    function setState(next){
      td.setAttribute('data-attended', next);
      renderGlyph(next);
      if (onChange) onChange();
    }

    let pressTimer = null;
    let longPressFired = false;
    let pointerActive = false;

    function endPress(){
      pointerActive = false;
      clearTimeout(pressTimer);
    }

    toggle.addEventListener('pointerdown', function(e){
      e.preventDefault();
      pointerActive = true;
      longPressFired = false;
      pressTimer = setTimeout(function(){
        if (!pointerActive) return;
        longPressFired = true;
        const cur = td.getAttribute('data-attended') || '';
        setState(cur === 'false' ? '' : 'false');
      }, 500);
    });
    toggle.addEventListener('pointerup', function(e){
      e.preventDefault();
      const wasLongPress = longPressFired;
      endPress();
      if (!wasLongPress){
        const cur = td.getAttribute('data-attended') || '';
        setState(cur === 'true' ? '' : 'true');
      }
      longPressFired = false;
    });
    toggle.addEventListener('pointerleave', endPress);
    toggle.addEventListener('pointercancel', endPress);

    const amount = document.createElement('span');
    amount.className = 'fee-amount';
    amount.contentEditable = 'true';
    amount.textContent = fee || '';
    amount.addEventListener('input', function(){ if (onChange) onChange(); });

    const unit = document.createElement('span');
    unit.className = 'fee-unit';
    unit.textContent = '불';

    td.appendChild(toggle);
    td.appendChild(amount);
    td.appendChild(unit);
    return td;
  }

  function makeDateCell(text, cls){
    const td = document.createElement('td');
    td.className = cls || '';
    const input = document.createElement('input');
    input.type = 'date';
    input.className = 'paid-date-input';
    if (text && /^\d{4}-\d{2}-\d{2}$/.test(text)) input.value = text;
    td.appendChild(input);
    return td;
  }

  function addRowTo(tbodyEl, data, onChange){
    data = data || ['', '', '', '', '', defaultFee, '', ''];
    const tr = document.createElement('tr');
    tr.appendChild(makePickerCell(data[0], 'col-name', 'name'));
    tr.appendChild(makePickerCell(data[1], 'col-day', 'day'));
    tr.appendChild(makeEditableCell(data[2], 'col-time', function(){ if (tbodyEl === tableBody) renderWeekPlanner(); }));
    tr.appendChild(makePickerCell(data[3], 'col-place', 'place'));
    tr.appendChild(makePickerCell(data[4], 'col-session', 'session'));
    tr.appendChild(makeDateCell(data[6], 'col-paid'));
    tr.appendChild(makeFeeCell(data[5], normalizeAttended(data[7]), onChange));

    const delTd = document.createElement('td');
    delTd.className = 'col-del no-print';
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.type = 'button';
    delBtn.innerHTML = '&#10005;';
    delBtn.addEventListener('click', function(){
      tr.remove();
      if (onChange) onChange();
      if (tbodyEl === tableBody){ scheduleAutoFit(); renderWeekPlanner(); }
    });
    delTd.appendChild(delBtn);
    tr.appendChild(delTd);

    tbodyEl.appendChild(tr);
  }

  function getRowsFrom(tbodyEl){
    return Array.from(tbodyEl.querySelectorAll('tr')).map(function(tr){
      const cells = tr.querySelectorAll('td');
      const feeTd = tr.querySelector('.col-fee');
      const paidTd = tr.querySelector('.col-paid');
      return [
        cells[0].querySelector('.picker-text').textContent.trim(),
        cells[1].querySelector('.picker-text').textContent.trim(),
        cells[2].textContent.trim(),
        cells[3].querySelector('.picker-text').textContent.trim(),
        cells[4].querySelector('.picker-text').textContent.trim(),
        feeTd.querySelector('.fee-amount').textContent.trim(),
        paidTd.querySelector('input').value.trim(),
        feeTd.getAttribute('data-attended') || ''
      ];
    });
  }

  function addRow(data){ addRowTo(tableBody, data, recalcSummary); scheduleAutoFit(); renderWeekPlanner(); }

  addRowBtn.addEventListener('click', function(){ addRow(); recalcSummary(); });

  // ---- Shared picker popover ----
  function renderPickerList(){
    pickerListEl.innerHTML = '';
    fieldData[activeField].forEach(function(opt){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'picker-option';
      btn.textContent = opt;
      const del = document.createElement('span');
      del.className = 'del-option';
      del.innerHTML = '&#10005;';
      del.addEventListener('click', function(e){
        e.stopPropagation();
        fieldData[activeField] = fieldData[activeField].filter(function(o){ return o !== opt; });
        pushState();
        renderPickerList();
      });
      btn.appendChild(del);
      btn.addEventListener('click', function(){
        if (activePickerCell){
          activePickerCell.querySelector('.picker-text').textContent = opt;
        }
        closePickerPopover();
        renderWeekPlanner();
      });
      pickerListEl.appendChild(btn);
    });
  }

  function openPickerPopover(td, field){
    activePickerCell = td;
    activeField = field;
    renderPickerList();
    newOptionInput.value = '';
    pickerPopover.classList.add('open');
    popoverBackdrop.classList.add('open');
  }

  function closePickerPopover(){
    pickerPopover.classList.remove('open');
    popoverBackdrop.classList.remove('open');
    activePickerCell = null;
    activeField = null;
  }

  popoverBackdrop.addEventListener('click', closePickerPopover);

  function addNewOption(){
    const val = newOptionInput.value.trim();
    if (!val || !activeField) return;
    if (fieldData[activeField].indexOf(val) === -1){
      fieldData[activeField].push(val);
      pushState();
    }
    if (activePickerCell){
      activePickerCell.querySelector('.picker-text').textContent = val;
    }
    closePickerPopover();
    renderWeekPlanner();
  }
  newOptionBtn.addEventListener('click', addNewOption);
  newOptionInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter'){ e.preventDefault(); addNewOption(); }
  });

  // ---- Fee summary ----
  function getCurrentRows(){
    return getRowsFrom(tableBody);
  }

  const CANONICAL_DAYS = ['월', '화', '수', '목', '금', '토', '일'];

  function renderWeekPlanner(){
    const rows = getCurrentRows();
    const groups = {};
    const order = [];
    CANONICAL_DAYS.forEach(function(d){ groups[d] = []; order.push(d); });
    rows.forEach(function(r){
      const day = r[1] || '기타';
      if (!groups[day]){ groups[day] = []; order.push(day); }
      groups[day].push({ time: r[2] || '', name: r[0] || '(이름 없음)' });
    });

    weekPlannerEl.innerHTML = '';
    order.forEach(function(day){
      const entries = groups[day];
      const col = document.createElement('div');
      col.className = 'planner-day';

      const head = document.createElement('div');
      head.className = 'planner-day-head';
      head.textContent = day;
      col.appendChild(head);

      if (entries.length === 0){
        const empty = document.createElement('div');
        empty.className = 'planner-empty';
        empty.textContent = '-';
        col.appendChild(empty);
      } else {
        entries.forEach(function(e){
          const item = document.createElement('div');
          item.className = 'planner-entry';
          const timeSpan = document.createElement('span');
          timeSpan.className = 'planner-time';
          timeSpan.textContent = e.time;
          const nameSpan = document.createElement('span');
          nameSpan.className = 'planner-name';
          nameSpan.textContent = e.name;
          item.appendChild(timeSpan);
          item.appendChild(nameSpan);
          col.appendChild(item);
        });
      }
      weekPlannerEl.appendChild(col);
    });
  }

  function computeTotals(rows){
    let expected = 0, actual = 0;
    rows.forEach(function(r){
      const fee = parseFee(r[5]);
      const state = r[7] || '';
      if (state !== 'false') expected += fee;
      if (state === 'true') actual += fee;
    });
    return { expected: expected, actual: actual };
  }

  function buildRecalc(getRowsFn, expectedEl, actualEl, actualRowEl){
    return function(){
      const totals = computeTotals(getRowsFn());
      expectedEl.textContent = formatWon(totals.expected);
      actualEl.textContent = formatWon(totals.actual);
      actualRowEl.style.display = 'flex';
    };
  }

  const recalcSummary = buildRecalc(getCurrentRows, feeExpectedEl, feeActualEl, feeActualRowEl);
  recalcSummary();

  const recalcModalSummary = buildRecalc(function(){ return getRowsFrom(modalTableBody); }, modalFeeExpectedEl, modalFeeActualEl, modalFeeActualRowEl);

  // Seed with example rows on load
  addRow(['오스카', '월', '4:00 pm', '홈랜드', '개인레슨', '50', '', '']);
  addRow(['엘리엇', '화', '3:30 pm', '메도뱅크', '', '50', '', '']);
  recalcSummary();
  autoFitTable();
  renderWeekPlanner();

  // ---- Weekly archive ----
  function updateEditingBadge(){
    if (currentWeekId){
      editingBadgeEl.textContent = '"' + weekTitle.value + '" 수정 중 · 저장하면 덮어씀';
    } else {
      editingBadgeEl.textContent = '';
    }
  }

  function renderArchive(){
    archiveList.innerHTML = '';
    let cumulative = 0;
    weeksArchive.forEach(function(w){ cumulative += (w.actualTotal || w.expectedTotal || 0); });
    archiveCumulativeEl.textContent = weeksArchive.length ? ('누적 수업료(결석 차감 후): ' + formatWon(cumulative)) : '';

    if (weeksArchive.length === 0){
      archiveList.innerHTML = '<p class="archive-empty">저장된 주 없음. "이번 주 저장" 클릭.</p>';
      return;
    }
    weeksArchive.slice().reverse().forEach(function(week){
      const item = document.createElement('div');
      item.className = 'archive-item';

      const info = document.createElement('div');
      info.className = 'archive-info';
      const title = document.createElement('div');
      title.className = 'archive-title';
      title.textContent = week.title;
      const date = document.createElement('div');
      date.className = 'archive-date';
      const totalLabel = week.actualTotal !== undefined ? (' · ' + formatWon(week.actualTotal)) : '';
      date.textContent = week.savedAt + ' 저장 · ' + week.rows.length + '명' + totalLabel;
      info.appendChild(title);
      info.appendChild(date);

      const actions = document.createElement('div');
      actions.className = 'archive-actions';
      const loadBtn = document.createElement('button');
      loadBtn.className = 'btn-secondary';
      loadBtn.type = 'button';
      loadBtn.textContent = '열어서 편집';
      loadBtn.addEventListener('click', function(){
        openEditModal(week);
      });
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-ghost';
      delBtn.type = 'button';
      delBtn.textContent = '삭제';
      delBtn.addEventListener('click', function(){
        weeksArchive = weeksArchive.filter(function(w){ return w.id !== week.id; });
        if (currentWeekId === week.id) currentWeekId = null;
        pushState();
        renderArchive();
        updateEditingBadge();
      });
      actions.appendChild(loadBtn);
      actions.appendChild(delBtn);

      item.appendChild(info);
      item.appendChild(actions);
      archiveList.appendChild(item);
    });
  }

  function openEditModal(week){
    modalWeekTitle.value = week.title;
    modalTableBody.innerHTML = '';
    week.rows.forEach(function(row){ addRowTo(modalTableBody, row, recalcModalSummary); });
    recalcModalSummary();
    editModalOverlay.dataset.weekId = week.id;
    editModalOverlay.classList.add('open');
  }
  function closeEditModal(){
    editModalOverlay.classList.remove('open');
    editModalOverlay.dataset.weekId = '';
    modalTableBody.innerHTML = '';
  }
  modalCloseBtn.addEventListener('click', closeEditModal);
  modalCancelBtn.addEventListener('click', closeEditModal);
  modalAddRowBtn.addEventListener('click', function(){
    addRowTo(modalTableBody, null, recalcModalSummary);
    recalcModalSummary();
  });
  modalSaveBtn.addEventListener('click', function(){
    const id = editModalOverlay.dataset.weekId;
    if (!id) return;
    const rows = getRowsFrom(modalTableBody);
    const totals = computeTotals(rows);
    const idx = weeksArchive.findIndex(function(w){ return w.id === id; });
    if (idx < 0) { closeEditModal(); return; }
    const d = new Date();
    weeksArchive[idx] = {
      id: id,
      title: modalWeekTitle.value || '제목 없음',
      savedAt: `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`,
      rows: rows,
      expectedTotal: totals.expected,
      actualTotal: totals.actual
    };
    pushState();
    renderArchive();
    closeEditModal();
  });

  topSaveBtn.addEventListener('click', function(){
    pushState();
    const original = topSaveBtn.textContent;
    topSaveBtn.textContent = '저장됨!';
    setTimeout(function(){ topSaveBtn.textContent = original; }, 1200);
  });

  saveWeekBtn.addEventListener('click', function(){
    const d = new Date();
    const savedAt = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    const rows = getCurrentRows();
    const totals = computeTotals(rows);
    const entry = {
      id: currentWeekId || Date.now().toString(),
      title: weekTitle.value || '제목 없음',
      savedAt: savedAt,
      rows: rows,
      expectedTotal: totals.expected,
      actualTotal: totals.actual
    };
    if (currentWeekId){
      const idx = weeksArchive.findIndex(function(w){ return w.id === currentWeekId; });
      if (idx >= 0) weeksArchive[idx] = entry; else weeksArchive.push(entry);
    } else {
      currentWeekId = entry.id;
      weeksArchive.push(entry);
    }
    pushState();
    renderArchive();
    updateEditingBadge();
    const original = saveWeekBtn.textContent;
    saveWeekBtn.textContent = '저장됨!';
    setTimeout(function(){ saveWeekBtn.textContent = original; }, 1200);
  });

  newWeekBtn.addEventListener('click', function(){
    currentWeekId = null;
    weekTitle.value = autoWeekTitle();
    weekRangeEl.textContent = getWeekRangeLabel();
    tableBody.innerHTML = '';
    addRow();
    recalcSummary();
    autoFitTable();
    renderWeekPlanner();
    updateEditingBadge();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  lastWeekBtn.addEventListener('click', function(){
    if (weeksArchive.length === 0){
      alert('저장된 지난주 기록이 없어요.');
      return;
    }
    const lastWeek = weeksArchive[weeksArchive.length - 1];
    currentWeekId = null;
    weekTitle.value = autoWeekTitle();
    weekRangeEl.textContent = getWeekRangeLabel();
    tableBody.innerHTML = '';
    lastWeek.rows.forEach(function(row){
      const copy = row.slice();
      copy[6] = '';       // 납부일은 매주 새로 입력
      copy[7] = '';        // 참석 여부는 매주 새로 체크하도록 초기화
      addRow(copy);
    });
    recalcSummary();
    autoFitTable();
    renderWeekPlanner();
    updateEditingBadge();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  renderArchive();

  // ---- PDF export ----
  function formatDateDisplay(v){
    if (!v) return '미납';
    const d = new Date(v + 'T00:00:00');
    if (isNaN(d)) return v;
    return `${d.getMonth() + 1}/${d.getDate()}`;
  }

  pdfBtn.addEventListener('click', function(){
    openPdfModal();
  });

  pdfConfirmBtn.addEventListener('click', async function(){
    pdfConfirmBtn.disabled = true;
    const originalText = pdfConfirmBtn.textContent;
    pdfConfirmBtn.textContent = '만드는 중...';
    try{
      const toHide = document.querySelectorAll('.no-print');
      const prevDisplay = [];
      toHide.forEach(function(el){ prevDisplay.push(el.style.display); el.style.display = 'none'; });

      const dateSwaps = [];
      sheet.querySelectorAll('.paid-date-input').forEach(function(inp){
        const span = document.createElement('span');
        span.textContent = formatDateDisplay(inp.value);
        inp.style.display = 'none';
        inp.insertAdjacentElement('afterend', span);
        dateSwaps.push({ inp: inp, span: span });
      });

      const canvas = await html2canvas(sheet, { scale: 2, backgroundColor: '#ffffff' });

      toHide.forEach(function(el, i){ el.style.display = prevDisplay[i]; });
      dateSwaps.forEach(function(item){ item.span.remove(); item.inp.style.display = ''; });

      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageWidth = 210, pageHeight = 297, margin = 12;
      const imgWidth = pageWidth - margin * 2;
      const imgHeight = canvas.height * imgWidth / canvas.width;

      let heightLeft = imgHeight;
      let position = margin;

      pdf.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - margin * 2);

      while (heightLeft > 0){
        position = heightLeft - imgHeight + margin;
        pdf.addPage();
        pdf.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
        heightLeft -= (pageHeight - margin * 2);
      }

      const safeTitle = (weekTitle.value || '축구교실_시간표').replace(/[\\/:*?"<>|]/g, '');
      pdf.save(safeTitle + '.pdf');
      closePdfModal(true);
    } catch(err){
      alert('PDF 생성 중 문제가 발생했어요. 다시 시도해 주세요.');
      console.error(err);
    } finally {
      pdfConfirmBtn.disabled = false;
      pdfConfirmBtn.textContent = originalText;
    }
  });
})();
</script>
</body>
</html>
